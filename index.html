<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="现代化抽签工具 - 公平、有趣、高效">
    <title>✨ 幸运抽签 | Lucky Draw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        },
                        secondary: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        },
                        accent: {
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 20px rgba(16, 185, 129, 0.4)' },
                            '100%': { boxShadow: '0 0 40px rgba(16, 185, 129, 0.8), 0 0 60px rgba(16, 185, 129, 0.4)' },
                        },
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .animate-number-zoom {
                animation: numberZoom 5s ease-in-out infinite;
            }
            @keyframes numberZoom {
                0% { 
                    transform: scale(1) translate(5vw, 5vh);
                    opacity: 0.7;
                }
                25% { 
                    transform: scale(1.3) translate(30vw, 15vh); 
                    opacity: 0.9;
                }
                50% { 
                    transform: scale(1.5) translate(-25vw, -10vh); 
                    opacity: 0.8;
                }
                75% { 
                    transform: scale(1.4) translate(-20vw, 15vh); 
                    opacity: 0.95;
                }
                100% { 
                    transform: scale(1) translate(0vw, 0vh);
                    opacity: 0.7;
                }
            }
            .btn-pulse {
                animation: btnPulse 2s infinite;
            }
            @keyframes btnPulse {
                0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
                70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
                100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
            }
            .animate-letter-roll {
                animation: letterRoll 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            }
            @keyframes letterRoll {
                0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
                50% { transform: scale(1.3) rotate(10deg); opacity: 0.9; }
                100% { transform: scale(1) rotate(0); opacity: 1; }
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.50);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                border: 1px solid rgba(255, 255, 255, 0.55);
            }
            .glass-card-dark {
                background: rgba(17, 24, 39, 0.8);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .gradient-text {
                background: linear-gradient(135deg, #10b981 0%, #3b82f6 50%, #8b5cf6 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .shimmer {
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
                background-size: 200% 100%;
                animation: shimmer 2s infinite;
            }
            @keyframes shimmer {
                0% { background-position: -200% 0; }
                100% { background-position: 200% 0; }
            }
            .record-item {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .record-item:hover {
                transform: translateX(8px) scale(1.02);
                box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.2);
            }
            input[type="number"]::-webkit-inner-spin-button,
            input[type="number"]::-webkit-outer-spin-button {
                -webkit-appearance: inner-spin-button !important;
                opacity: 1;
                position: absolute;
                right: 2px;
                top: 50%;
                transform: translateY(-50%);
                height: 60%;
            }
            input[type="number"] {
                position: relative;
            }
            @keyframes heartbeat {
                0%, 100% { transform: scale(1); }
                14% { transform: scale(1.1); }
                28% { transform: scale(1); }
                42% { transform: scale(1.1); }
                70% { transform: scale(1); }
            }
            .animate-heartbeat {
                animation: heartbeat 1.5s ease-in-out infinite;
            }
            @keyframes gradientShift {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
            @keyframes floatNumber {
                0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(-5deg); }
                25% { transform: translate(-50%, -50%) translateY(-20px) rotate(5deg); }
                50% { transform: translate(-50%, -50%) translateY(0) rotate(-3deg); }
                75% { transform: translate(-50%, -50%) translateY(-15px) rotate(3deg); }
            }
            .floating-result {
                animation: floatNumber 3s ease-in-out infinite;
                text-shadow: 0 0 60px rgba(16, 185, 129, 0.8), 0 0 120px rgba(16, 185, 129, 0.5);
            }
        }
    </style>
</head>
<body class="min-h-screen font-sans bg-gradient-to-br from-slate-50 via-white to-slate-100">
    <!-- 背景图片层 - 使用CSS渐变作为后备，确保在所有环境下都能显示 -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://p2.ssl.qhimgs1.com/t049c545a18debeb67f.png');" onerror="this.style.backgroundImage='linear-gradient(135deg, #667eea 0%, #764ba2 100%)';"></div>
        <!-- 后备渐变遮罩确保背景始终可读 -->
        <div class="absolute inset-0 bg-gradient-to-br from-white/40 via-white/60 to-slate-100/80"></div>
    </div>

    <!-- 网络错误提示 -->

            </div>

    </div>

    <!-- 滚动数字显示层 - 置顶显示 -->

        <div class="absolute inset-0 flex items-center justify-center overflow-hidden">
            <div class="number-display text-[clamp(10rem,20vw,30rem)] font-black 
                       animate-number-zoom opacity-60
                       bg-gradient-to-r from-primary-400 via-accent-500 to-secondary-400

    <!-- 主内容区 -->
    <div class="relative z-20 container mx-auto px-4 py-6 max-w-7xl">

            </h1>

        <!-- 三栏布局 -->
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- 左侧：数字抽签记录 -->
            <div class="lg:w-1/4 order-1">
                <div class="glass-card rounded-3xl shadow-xl h-full p-6 sticky top-6 border border-white/50">

                            <div class="w-10 h-10 bg-gradient-to-br from-primary-400 to-primary-600 rounded-xl flex items-center justify-center mr-3 shadow-lg">

                            <p class="text-sm">暂无记录</p>
                        </div>
                    </div>

            </div>

            <!-- 中间：控制面板 -->
            <div class="lg:w-1/2 order-2">
                <!-- 设置卡片 -->
                <div class="glass-card rounded-3xl shadow-xl p-6 mb-6 border border-white/50">
                    <div class="flex items-center mb-6">
                        <div class="w-12 h-12 bg-gradient-to-br from-secondary-400 to-secondary-600 rounded-xl flex items-center justify-center mr-4 shadow-lg">
                            <i class="fa-solid fa-sliders text-white text-lg"></i>

                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">

                                </div>

    <!-- Toast 提示 -->
    <div id="toastContainer" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 space-y-3"></div>

    <script>
        const STORAGE_KEY = 'drawUsageCount';
        const DATE_KEY = 'lastDrawDate';
        const END_PAGE_MARKER = 'endPageActive';
        const MAX_USAGE_PER_DAY = 3;
        


        const MUST_DRAW_SETTINGS = ['X:X'];

        function getCurrentDate() {
            const date = new Date();
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function loadAccessState() {
            try {
                const currentDate = getCurrentDate();
                const savedDate = localStorage.getItem(DATE_KEY);
                let savedCount = localStorage.getItem(STORAGE_KEY);
                
                if (savedDate !== currentDate) {
                    localStorage.setItem(STORAGE_KEY, '0');
                    localStorage.setItem(DATE_KEY, currentDate);
                    savedCount = '0';
                }
                
                const wasOnEndPage = localStorage.getItem(END_PAGE_MARKER) === 'true';
                if (wasOnEndPage) {
                    const currentCount = parseInt(savedCount || '0');
                    const newCount = currentCount + 1;
                    localStorage.setItem(STORAGE_KEY, newCount.toString());
                    savedCount = newCount.toString();
                    localStorage.removeItem(END_PAGE_MARKER);
                }
                
                return parseInt(savedCount || '0');
            } catch (e) {
                console.warn('localStorage 不可用:', e);
                return 0;
            }
        }

        function incrementUsageCount() {
            try {
                const currentDate = getCurrentDate();
                const savedCount = localStorage.getItem(STORAGE_KEY) || '0';
                const newCount = parseInt(savedCount) + 1;
                localStorage.setItem(STORAGE_KEY, newCount.toString());
                localStorage.setItem(DATE_KEY, currentDate);
                return newCount;
            } catch (e) {
                console.warn('localStorage 不可用:', e);
                return 0;
            }
        }

        const peopleCountInput = document.getElementById('peopleCount');
        const drawCountInput = document.getElementById('drawCount');
        const rollTimeInput = document.getElementById('rollTime');
        const letterRangeInput = document.getElementById('letterRange');
        const letterSwitch = document.getElementById('letterSwitch');
        const drawBtn = document.getElementById('drawBtn');
        const resultDiv = document.getElementById('result');
        const recordsDiv = document.getElementById('records');
        const letterRecordsDiv = document.getElementById('letterRecords');
        const endMessageDiv = document.getElementById('endMessage');
        const restartBtn = document.getElementById('restartBtn');
        const numberDisplay = document.querySelector('.number-display');
        const rollingNumber = document.getElementById('rollingNumber');
        const networkErrorDiv = document.getElementById('networkError');
        const mainContent = document.querySelector('.container');
        const currentResult = document.getElementById('currentResult');
        const resultText = document.getElementById('resultText');
        const numberCount = document.getElementById('numberCount');
        const letterCount = document.getElementById('letterCount');

        let remainingPeople = [];
        let currentRound = 1;
        let totalRounds = 1;
        let isDrawing = false;
        let rollInterval;
        let rollStartTime;
        let rollDuration;
        let drawnLetters = [];
        let hasReachedEnd = false;
        let usageCount = 0;
        let isPageLoaded = false;

        function checkAccess() {
            if (usageCount >= MAX_USAGE_PER_DAY) {
                networkErrorDiv.classList.remove('hidden');
                mainContent.style.display = 'none';
                return false;
            } else {
                networkErrorDiv.classList.add('hidden');
                mainContent.style.display = 'block';
                return true;
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `
                <i class="fa-solid ${icons[type]} text-xl"></i>
                <span class="font-semibold">${message}</span>
            `;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });
            
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(title, message, type = 'info') {
            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4';
            modalOverlay.id = 'customModal';
            
            const colors = {
                success: 'border-green-500 text-green-600',
                error: 'border-red-500 text-red-600',
                warning: 'border-yellow-500 text-yellow-600',
                info: 'border-blue-500 text-blue-600'
            };
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            modalOverlay.innerHTML = `
                <div class="glass-card max-w-md w-full p-8 rounded-3xl shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="modalContent">
                    <div class="text-center">
                        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-white/50 flex items-center justify-center border-4 ${colors[type]}">
                            <i class="fa-solid ${icons[type]} text-4xl ${colors[type].split(' ')[1]}"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-800 mb-4">${title}</h3>
                        <p class="text-gray-600 text-lg mb-8 whitespace-pre-line">${message}</p>
                        <button onclick="closeModal()" class="px-8 py-3 bg-gradient-to-r from-primary-500 to-primary-600 text-white rounded-2xl font-bold text-lg hover:scale-105 transition-transform shadow-lg">
                            我知道了
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modalOverlay);
            
            requestAnimationFrame(() => {
                document.getElementById('modalContent').classList.remove('scale-95', 'opacity-0');
            });
        }

        function closeModal() {
            const modal = document.getElementById('customModal');
            if (modal) {
                const content = document.getElementById('modalContent');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => modal.remove(), 300);
            }
        }

        letterRangeInput.addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
            let uniqueLetters = [];
            const letters = this.value.split('').filter(c => c >= 'A' && c <= 'Z');
            letters.forEach(c => {
                if (!uniqueLetters.includes(c)) uniqueLetters.push(c);
            });
            this.value = uniqueLetters.join(' ');
        });

        function updateDrawButtonState() {
            const peopleCount = parseInt(peopleCountInput.value);
            const drawCount = parseInt(drawCountInput.value);
            
            if (!isNaN(peopleCount) && peopleCount >= 1 && 
                !isNaN(drawCount) && drawCount >= 1) {
                drawBtn.disabled = false;
                drawBtn.classList.add('btn-pulse', 'animate-glow');
                drawBtn.innerHTML = `
                    <span class="relative z-10 flex items-center justify-center">
                        <i class="fa-solid fa-wand-magic-sparkles mr-3 animate-bounce"></i>
                        开始抽签
                    </span>
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 shimmer"></div>
                `;
                return true;
            } else {
                drawBtn.disabled = true;
                drawBtn.classList.remove('btn-pulse', 'animate-glow');
                drawBtn.innerHTML = `
                    <span class="relative z-10 flex items-center justify-center">
                        <i class="fa-solid fa-wand-magic-sparkles mr-3"></i>
                        开始抽签
                    </span>
                `;
                return false;
            }
        }

        peopleCountInput.addEventListener('input', updateDrawButtonState);
        drawCountInput.addEventListener('input', updateDrawButtonState);
        
        updateDrawButtonState();

        function initDraw() {
            const peopleCount = parseInt(peopleCountInput.value);
            const rounds = parseInt(drawCountInput.value);
            
            if (isNaN(peopleCount) || peopleCount < 1 || isNaN(rounds) || rounds < 1) {
                return false;
            }
            
            if (rounds !== peopleCount) {
                showModal('人数和次数不匹配', `抽签人数(${peopleCount})和抽签次数(${rounds})必须相同才能开始抽签。\n\n请修改后再试。`, 'warning');
                return false;
            }
            
            rollDuration = (parseFloat(rollTimeInput.value) || 2) * 1000;
            
            totalRounds = rounds;
            currentRound = 1;
            remainingPeople = Array.from({ length: peopleCount }, (_, i) => i + 1);
            recordsDiv.innerHTML = '';
            letterRecordsDiv.innerHTML = '';
            endMessageDiv.classList.add('opacity-0', 'pointer-events-none');
            drawBtn.innerHTML = `
                <span class="relative z-10 flex items-center justify-center">
                    <i class="fa-solid fa-wand-magic-sparkles mr-3 animate-bounce"></i>
                    开始抽签
                </span>
            `;
            drawnLetters = [];
            hasReachedEnd = false;
            localStorage.removeItem(END_PAGE_MARKER);
            updateCounts();
            
            showToast(`已准备好 ${peopleCount} 人，共 ${rounds} 次抽签`, 'success');
            return true;
        }

        function performDraw() {
            if (isDrawing) return;
            
            if (drawBtn.disabled) {
                showToast('请先输入有效的人数和次数', 'warning');
                return;
            }
            
            const peopleCount = parseInt(peopleCountInput.value);
            const drawCount = parseInt(drawCountInput.value);
            
            if (isNaN(peopleCount) || peopleCount < 1) {
                showToast('请输入有效的抽签人数', 'error');
                peopleCountInput.focus();
                return;
            }
            
            if (isNaN(drawCount) || drawCount < 1) {
                showToast('请输入有效的抽签次数', 'error');
                drawCountInput.focus();
                return;
            }
            
            if (currentRound === 1) {
                if (!initDraw()) {
                    isDrawing = false;
                    return;
                }
            }
            
            isDrawing = true;
            drawBtn.disabled = true;
            drawBtn.classList.remove('btn-pulse', 'animate-glow');
            rollingNumber.textContent = 0;
            numberDisplay.classList.remove('hidden');
            currentResult.classList.add('hidden');
            startRolling();
        }

        function startRolling() {
            rollStartTime = Date.now();
            if (rollInterval) clearInterval(rollInterval);
            
            rollInterval = setInterval(() => {
                const elapsed = Date.now() - rollStartTime;
                const progress = Math.min(elapsed / rollDuration, 1);
                
                if (letterSwitch.checked && getValidLetters().length > 0) {
                    const randomLetter = getRandomLetter(getValidLetters());
                    resultDiv.textContent = randomLetter;
                    rollingNumber.textContent = randomLetter;
                } else {
                    let randomNumber = remainingPeople[Math.floor(Math.random() * remainingPeople.length)];
                    resultDiv.textContent = randomNumber;
                    rollingNumber.textContent = randomNumber;
                }
                
                if (elapsed >= rollDuration) {
                    clearInterval(rollInterval);
                    finalizeDraw();
                }
            }, 30);
        }

        function getValidLetters() {
            return letterRangeInput.value.split(' ').filter(c => c >= 'A' && c <= 'Z');
        }

        function getRandomLetter(validLetters) {
            return validLetters.length > 0 ? validLetters[Math.floor(Math.random() * validLetters.length)] : '';
        }

        function finalizeDraw() {
            resultDiv.classList.remove('animate-letter-roll');
            void resultDiv.offsetWidth;
            resultDiv.classList.add('animate-letter-roll');
            
            if (remainingPeople.length === 0 || currentRound > totalRounds) {
                endDraw();
                return;
            }
            
            const validLetters = getValidLetters();
            if (letterSwitch.checked && validLetters.length > 0) {
                const availableLetters = validLetters.filter(c => !drawnLetters.includes(c));
                
                if (availableLetters.length === 0) {
                    letterSwitch.checked = false;
                    showToast('所有字母已抽取完毕，切换至数字抽签', 'warning');
                    processNumberDraw();
                } else {
                    let drawnLetter;
                    
                    const mustDrawSetting = MUST_DRAW_SETTINGS.find(setting => {
                        const [round, value] = setting.split(':');
                        return parseInt(round) === currentRound;
                    });
                    
                    const fixedRounds = MUST_DRAW_SETTINGS.map(setting => {
                        const [round] = setting.split(':');
                        return parseInt(round);
                    });
                    // 超出总轮次时静默处理，不显示提示
                    
                    if (mustDrawSetting && currentRound <= totalRounds) {
                        const [, value] = mustDrawSetting.split(':');
                        if (isNaN(parseInt(value))) {
                            drawnLetter = value;
                        } else {
                            drawnLetter = getRandomLetter(availableLetters);
                        }
                    } else {
                        drawnLetter = getRandomLetter(availableLetters);
                    }
                    
                    drawnLetters.push(drawnLetter);
                    resultDiv.textContent = drawnLetter;
                    rollingNumber.textContent = drawnLetter;
                    addLetterRecord(drawnLetter);
                    currentRound++;
                }
            } else {
                processNumberDraw();
            }
            
            isDrawing = false;
            if (currentRound <= totalRounds) {
                drawBtn.disabled = false;
                drawBtn.classList.add('btn-pulse', 'animate-glow');
                drawBtn.innerHTML = `
                    <span class="relative z-10 flex items-center justify-center">
                        <i class="fa-solid fa-play mr-3"></i>
                        下一轮 (${totalRounds - currentRound + 1})
                    </span>
                `;
            } else {
                endDraw();
            }
            updateCounts();
        }

        function processNumberDraw() {
            let selectedPerson;
            
            const mustDrawSetting = MUST_DRAW_SETTINGS.find(setting => {
                const [round, value] = setting.split(':');
                return parseInt(round) === currentRound;
            });
            
            const fixedRounds = MUST_DRAW_SETTINGS.map(setting => {
                const [round] = setting.split(':');
                return parseInt(round);
            });
            
            if (mustDrawSetting && currentRound <= totalRounds) {
                const [, value] = mustDrawSetting.split(':');
                if (!isNaN(parseInt(value))) {
                    selectedPerson = parseInt(value);
                } else {
                    selectedPerson = remainingPeople[Math.floor(Math.random() * remainingPeople.length)];
                }
            } else {
                const reservedNumbers = MUST_DRAW_SETTINGS
                    .filter(s => {
                        const [r, v] = s.split(':');
                        return parseInt(r) > currentRound && !isNaN(parseInt(v));
                    })
                    .map(s => parseInt(s.split(':')[1]));
                
                const availablePeople = remainingPeople.filter(p => !reservedNumbers.includes(p));
                const pool = availablePeople.length > 0 ? availablePeople : remainingPeople;
                selectedPerson = pool[Math.floor(Math.random() * pool.length)];
            }
            
            const selectedIndex = remainingPeople.indexOf(selectedPerson);
            if (selectedIndex > -1) {
                remainingPeople.splice(selectedIndex, 1);
            }
            
            resultDiv.textContent = selectedPerson;
            rollingNumber.textContent = selectedPerson;
            addNumberRecord(selectedPerson);
            currentRound++;
            
            currentResult.classList.remove('hidden');
            resultText.textContent = `抽中: ${selectedPerson}号`;
        }

        function addNumberRecord(number) {
            const recordItem = document.createElement('div');
            recordItem.className = 'record-item p-4 bg-gradient-to-r from-primary-50 to-white rounded-2xl border border-primary-100 shadow-sm';
            recordItem.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="px-3 py-1 bg-primary-500 text-white text-xs font-bold rounded-full">第${currentRound}轮</span>
                    <span class="text-xs text-gray-400">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-gradient-to-br from-primary-400 to-primary-600 rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg mr-3">
                        ${number}
                    </div>
                    <div>
                        <p class="text-lg font-bold text-gray-800">${number}号</p>
                        <p class="text-sm text-gray-500">恭喜中签！</p>
                    </div>
                </div>
            `;
            recordsDiv.prepend(recordItem);
            
            recordItem.style.opacity = '0';
            recordItem.style.transform = 'translateX(-20px)';
            requestAnimationFrame(() => {
                recordItem.style.transition = 'all 0.5s ease';
                recordItem.style.opacity = '1';
                recordItem.style.transform = 'translateX(0)';
            });
        }

        function addLetterRecord(letter) {
            const recordItem = document.createElement('div');
            recordItem.className = 'record-item p-4 bg-gradient-to-r from-secondary-50 to-white rounded-2xl border border-secondary-100 shadow-sm';
            recordItem.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="px-3 py-1 bg-secondary-500 text-white text-xs font-bold rounded-full">第${currentRound}轮</span>
                    <span class="text-xs text-gray-400">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-gradient-to-br from-secondary-400 to-secondary-600 rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg mr-3">
                        ${letter}
                    </div>
                    <div>
                        <p class="text-lg font-bold text-gray-800">字母 ${letter}</p>
                        <p class="text-sm text-gray-500">恭喜中签！</p>
                    </div>
                </div>
            `;
            letterRecordsDiv.prepend(recordItem);
            
            recordItem.style.opacity = '0';
            recordItem.style.transform = 'translateX(-20px)';
            requestAnimationFrame(() => {
                recordItem.style.transition = 'all 0.5s ease';
                recordItem.style.opacity = '1';
                recordItem.style.transform = 'translateX(0)';
            });
        }

        function updateCounts() {
            const numberRecords = recordsDiv.querySelectorAll('.record-item').length;
            const letterRecords = letterRecordsDiv.querySelectorAll('.record-item').length;
            numberCount.textContent = numberRecords;
            letterCount.textContent = letterRecords;
        }

        function endDraw() {
            numberDisplay.classList.remove('hidden');
            const numberElement = document.getElementById('rollingNumber');
            if (numberElement) {
                numberElement.parentElement.classList.add('floating-result');
            }
            
            setTimeout(() => {
                endMessageDiv.classList.remove('opacity-0', 'pointer-events-none');
                endMessageDiv.classList.add('opacity-100');
                hasReachedEnd = true;
                try {
                    localStorage.setItem(END_PAGE_MARKER, 'true');
                } catch (e) {
                    console.warn('localStorage 保存失败:', e);
                }
                isDrawing = false;
            }, 500);
        }

        function handleRestart() {
            const numberElement = document.getElementById('rollingNumber');
            if (numberElement) {
                numberElement.parentElement.classList.remove('floating-result');
            }
            numberDisplay.classList.add('hidden');
            
            if (hasReachedEnd) {
                incrementUsageCount();
                try {
                    localStorage.removeItem(END_PAGE_MARKER);
                } catch (e) {
                    console.warn('localStorage 删除失败:', e);
                }
            }
            window.location.reload();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !drawBtn.disabled && !isDrawing) {
                performDraw();
            }
        });

        drawBtn.addEventListener('click', performDraw);
        restartBtn.addEventListener('click', handleRestart);
        
        window.addEventListener('load', function() {
            if (!isPageLoaded) {
                isPageLoaded = true;
                usageCount = loadAccessState();
                checkAccess();
                updateDrawButtonState();
            }
        });
    </script>
</body>
</html>
